<ng-template #menu>
  @for (room of roomOptions; track room.code) {
    <a
      [routerLink]="['/', selectedLanguage().code, 'portfolio']"
      [queryParams]="{ room: room.code }"
      routerLinkActive="font-bold"
      [routerLinkActiveOptions]="{ exact: true }"
      class="whitespace-nowrap block btn btn-secondary"
    >
      {{ room | translated: "title" }}
    </a>
  }
</ng-template>

<ng-template #trigger>
  <a
    [routerLink]="['/', selectedLanguage().code, 'portfolio']"
    routerLinkActive="link-active"
    class="flex items-center gap-1"
  >
    {{ "navbar.portfolio" | translate }}
  </a>
</ng-template>

<app-dropdown [trigger]="trigger" [menu]="menu" />
