<section
  id="hero"
  class="relative size-full max-h-full overflow-hidden snap-start snap-always"
>
  <app-responsive-image
    [image]="image1()"
    loading="eager"
    decoding="sync"
    class="absolute inset-0 transition-opacity duration-1000"
    [class.opacity-0]="!showImage1()"
    [class.opacity-100]="showImage1()"
    alt="Background image 1"
    imgClass="size-full object-cover"
  />
  <app-responsive-image
    [image]="image2()"
    loading="eager"
    decoding="sync"
    class="absolute inset-0 transition-opacity duration-1000"
    [class.opacity-0]="showImage1()"
    [class.opacity-100]="!showImage1()"
    alt="Background image 2"
    imgClass="size-full object-cover"
  />

  <div class="z-20 absolute inset-0 flex justify-center items-center">
    <div class="popup flex flex-col justify-between">
      <div>
        <h1 class="mb-4">
          {{ "hero.title" | translate }}
        </h1>
        <p>
          {{ "hero.description" | translate }}
        </p>
      </div>

      <div class="flex flex-wrap justify-between gap-3 mt-8">
        <a [href]="'mailto:' + info.email" class="link">
          <img
            class="size-4 sm:size-5 mr-2"
            src="/images/icons/mail.png"
            [alt]="'contacts.mail' | translate"
          />
          <span>{{ info.email }}</span>
        </a>
        <a [href]="'tel:' + info.phone" class="link">
          <img
            class="size-4 sm:size-5 mr-2"
            src="/images/icons/phone.png"
            [alt]="'contacts.phone' | translate"
          />
          <span>{{ info.phone }}</span>
        </a>
        <a [href]="info.facebook" class="link">
          <img
            class="size-4 sm:size-5 mr-2"
            src="/images/icons/facebook.png"
            [alt]="'contacts.facebook' | translate"
          />
          <span>{{ info.facebookHandle }}</span>
        </a>
      </div>
    </div>
  </div>
</section>
