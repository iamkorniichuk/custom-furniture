<div class="fixed inset-0 bg-bg-muted -z-10 bg-center"></div>

<div
  #scrollElement
  infiniteScroll
  [infiniteScrollDistance]="1"
  [infiniteScrollThrottle]="200"
  (scrolled)="loadNextProjects()"
  [scrollWindow]="false"
  class="h-available snap-y snap-mandatory overflow-y-scroll flex justify-center"
>
  <div class="w-full max-w-7xl h-fit bg-bg shadow-xl shadow-primary">
    @for (row of projects(); track row.id) {
      <section
        class="snap-start h-available w-full flex flex-col-reverse md:flex-row overflow-hidden"
        [ngClass]="{ 'md:flex-row-reverse': $even }"
      >
        <div
          class="flex-1 flex flex-col justify-center px-6 py-8 sm:px-6 sm:py-8 md:px-8 md:py-10 lg:px-10 lg:py-12 z-10"
        >
          <h3
            class="text-xl sm:text-2xl md:text-3xl lg:text-4xl font-bold mb-2 sm:mb-3 md:mb-4 lg:mb-5"
          >
            {{ row | translated: "title" }}
          </h3>
          <p
            class="text-xs sm:text-sm md:text-base lg:text-lg mb-2 sm:mb-3 md:mb-4"
          >
            {{ row | translated: "description" }}
          </p>
        </div>
        <app-image-carousel
          class="flex-3 md:flex-auto overflow-hidden"
          [images]="row.images"
          [alt]="row | translated: 'title'"
        />
      </section>
    }
  </div>
</div>
