<div class="h-available w-full overflow-auto p-5">
  <table class="w-full border border-text-muted bg-bg text-left text-sm">
    <thead>
      <tr class="bg-bg-accent text-text font-semibold">
        <th class="px-4 py-2">Title</th>
        <th class="px-4 py-2">Date</th>
        <th class="px-4 py-2">Room</th>
        <th class="px-4 py-2 text-center">Actions</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-border">
      @for (row of projects(); track row.id) {
        <tr
          class="hover:bg-bg-accent/40 transition-colors"
          [ngClass]="{ 'bg-bg-muted': $odd }"
        >
          <td class="px-4 py-2">{{ row | translated: "title" }}</td>
          <td class="px-4 py-2 whitespace-nowrap">
            {{ row["datetime"].toDate() | date: "short" }}
          </td>
          <td class="px-4 py-2">{{ getRoom(row) | translated: "title" }}</td>
          <td class="px-4 py-2 text-center space-x-2">
            <button class="inline-flex btn btn-primary text-sm">Edit</button>
            <button class="inline-flex btn btn-primary text-sm">Delete</button>
          </td>
        </tr>
      }
    </tbody>
  </table>

  <button class="btn btn-primary w-full text-center" (click)="loadProjects()">
    Load more
  </button>
</div>
